name: Build & Publish Dashboard App

on:
  push:
    tags:
      - 'v*'

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-13
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/dashboard/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build monorepo
        run: pnpm turbo build --filter=@ai-knowledge/dashboard

      - name: Bundle sidecar
        working-directory: apps/dashboard
        run: node scripts/bundle-sidecar.mjs

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/dashboard
          tagName: ${{ github.ref_name }}
          releaseName: 'AI Knowledge Base ${{ github.ref_name }}'
          releaseBody: |
            ## AI Knowledge Base Dashboard

            Desktop app for managing your AI knowledge base.
            Download the installer for your platform below.

            **macOS:** `.dmg` file (arm64 for Apple Silicon, x64 for Intel)
            **Linux:** `.AppImage` or `.deb` file
          releaseDraft: false
          prerelease: false
